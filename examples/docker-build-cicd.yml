# Example workflow for using the generic Docker Build CI/CD reusable workflow
# Copy this file to your repository's .github/workflows/ directory and customize as needed

name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - '**'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: IntegralEnvision/.github/.github/workflows/docker-build-cicd.yml@main
    with:
      image_name: your-app/your-service
      registry: ghcr.io
      dockerfile_path: Dockerfile
      platforms: linux/amd64
      build_args: |
        BUILD_ARG_1=value1
        BUILD_ARG_2=value2
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  show-output:
    name: Show published tags
    runs-on: ubuntu-latest
    needs:
      - docker
    steps:
      - name: Print reusable workflow outputs
        run: |
          echo "SHA tag: ${{ needs.docker.outputs.image_tag }}"
          echo "SHA image: ${{ needs.docker.outputs.image }}"
          echo "Latest image: ${{ needs.docker.outputs.latest_image }}"
