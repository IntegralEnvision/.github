# Example workflow for using the Docker Image Deployment reusable workflow
# Copy this file to your repository's .github/workflows/ directory and customize as needed

name: Deploy Docker Image

on:
  push:
    tags:
      - '**'  # Trigger on any tag push
  # Uncomment the following to also trigger on pushes to main branch
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    uses: IntegralEnvision/.github/.github/workflows/dma-k8s-docker-build-cicd.yaml@main
    with:
      # Required: Your Docker image name
      image_name: "your-app/your-service"
      
      # Optional: Path to Dockerfile (defaults to "Dockerfile")
      dockerfile_path: "Dockerfile"
      
      # Optional: Target platforms (defaults to "linux/amd64")
      platforms: "linux/amd64"

      # Required: The environment to deploy to. Must be one of "dev", "test", "prod", or "pub"
      environment: "dev"
      
    secrets:
      # These secrets must be configured in your repository settings
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
