name: Build and Deploy Docker Image

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry URL (e.g., "integraldma.azurecr.io")'
        required: false
        default: 'integraldma.azurecr.io'
        type: string
      image_name:
        description: 'Docker image name (e.g., "shinyapps/app-flood")'
        required: true
        type: string
      dockerfile_path:
        description: 'Path to Dockerfile (default: "Dockerfile")'
        required: false
        type: string
        default: 'Dockerfile'
      platforms:
        description: 'Target platforms for build (default: "linux/amd64")'
        required: false
        type: string
        default: 'linux/amd64'
      environment:
        description: 'The -<environment>- portion of the tag which determines the ShinyProxy environment to deploy to.'
        required: true
        type: string
      build_args:
        description: 'Additional build arguments to pass to docker build'
        required: false
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      # Optional secret for applications that need secure build-time secrets
      API_TOKEN:
        description: 'API token for secure mounting during build'
        required: false

jobs:
  docker:
    name: Build and Deploy Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ inputs.image_name }}
      REGISTRY: ${{ inputs.registry }}

    steps:
      - name: Validate environment input
        run: |
            # pub -> public. Shortened name due to azure name length limits
            # Must exactly match one of these otherwise an image policy wont match the tag name
            if [[ ! "${{ inputs.environment }}" =~ ^(dev|test|prod|pub)$ ]]; then
            echo "Invalid tag prefix: ${{ inputs.environment }}"
            exit 1
            fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: AZ CLI Debug
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        run: |
          docker login $REGISTRY --username 00000000-0000-0000-0000-000000000000 --password-stdin <<< $(az acr login --name $REGISTRY --expose-token --output tsv --query accessToken)

      - name: Extract metadata for docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set environment variable
        run: echo "TAG=${GITHUB_SHA:0:7}-${{ inputs.environment }}-$(date +%s)" >> $GITHUB_ENV

      # https://github.com/docker/build-push-action
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          tags: ${{ steps.meta.outputs.tags }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          push: true
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          build-args: |
            ${{ inputs.build_args }}
          # Conditionally add secrets if API_TOKEN is provided
          secrets: ${{ secrets.API_TOKEN && format('api_token={0}', secrets.API_TOKEN) || '' }}