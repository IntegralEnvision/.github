name: Docker Build CI/CD

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name without the registry prefix
        required: true
        type: string
      registry:
        description: Container registry hostname
        required: false
        default: integraldma.azurecr.io
        type: string
      dockerfile_path:
        description: Path to the Dockerfile
        required: false
        default: Dockerfile
        type: string
      platforms:
        description: Target platforms for the build
        required: false
        default: linux/amd64
        type: string
      build_args:
        description: Multiline Docker build arguments
        required: false
        default: ""
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
    outputs:
      image_tag:
        description: Primary image tag generated from the commit SHA
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      image:
        description: Full image reference for the SHA-tagged image
        value: ${{ jobs.build-and-push.outputs.image }}
      latest_image:
        description: Full image reference for the latest tag
        value: ${{ jobs.build-and-push.outputs.latest_image }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ inputs.image_name }}
      REGISTRY: ${{ inputs.registry }}
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image: ${{ steps.meta.outputs.image }}
      latest_image: ${{ steps.meta.outputs.latest_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: AZ CLI Debug
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        run: |
          docker login $REGISTRY --username 00000000-0000-0000-0000-000000000000 --password-stdin <<< $(az acr login --name $REGISTRY --expose-token --output tsv --query accessToken)

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_ref="${{ inputs.registry }}/${{ inputs.image_name }}"

          echo "image_tag=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image_ref}:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${image_ref}:latest" >> "$GITHUB_OUTPUT"
          echo "cache_image=${image_ref}:buildcache" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: true
          build-args: ${{ inputs.build_args }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest_image }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.cache_image }}
          cache-to: |
            type=registry,ref=${{ steps.meta.outputs.cache_image }},mode=max,image-manifest=true,oci-mediatypes=true

