name: Docker Build CI/CD

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name without the registry prefix
        required: true
        type: string
      registry:
        description: Container registry hostname
        required: false
        default: integraldma.azurecr.io
        type: string
      dockerfile_path:
        description: Path to the Dockerfile
        required: false
        default: Dockerfile
        type: string
      platforms:
        description: Target platforms for the build
        required: false
        default: linux/amd64
        type: string
      build_args:
        description: Multiline Docker build arguments
        required: false
        default: ""
        type: string
    secrets:
      REGISTRY_USERNAME:
        description: Username for the target container registry
        required: true
      REGISTRY_PASSWORD:
        description: Password or token for the target container registry
        required: true
    outputs:
      image_tag:
        description: Primary image tag generated from the commit SHA
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      image:
        description: Full image reference for the SHA-tagged image
        value: ${{ jobs.build-and-push.outputs.image }}
      latest_image:
        description: Full image reference for the latest tag
        value: ${{ jobs.build-and-push.outputs.latest_image }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image: ${{ steps.meta.outputs.image }}
      latest_image: ${{ steps.meta.outputs.latest_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_ref="${{ inputs.registry }}/${{ inputs.image_name }}"

          echo "image_tag=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image_ref}:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${image_ref}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: true
          build-args: ${{ inputs.build_args }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest_image }}
